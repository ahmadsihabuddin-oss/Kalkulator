<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<title>Kalkulator Keuangan</title>

<style>
body {
    margin: 0;
    font-family: Arial;
    height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    background: #ffffff;
}

/* LAPTOP */
.laptop {
    position: relative;
    width: 750px;
    transform: perspective(1200px) rotateX(8deg);
}

.frame {
    background: #111;
    padding: 12px;
    border-radius: 18px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
}

.camera {
    width: 10px;
    height: 10px;
    background: #000;
    border-radius: 50%;
    margin: 0 auto 8px;
}

.screen {
    border-radius: 10px;
    padding: 20px;
    border: 6px solid #000;
    background: rgba(0,0,0,0.6);
    position: relative;
}

.container {
    position: relative;
    color: white;
}

.base {
    width: 115%;
    height: 80px;
    background: linear-gradient(to bottom, #222, #000);
    border-radius: 0 0 25px 25px;
    margin-left: -7.5%;
    margin-top: -5px;
}

.keyboard {
    display: grid;
    grid-template-columns: repeat(14, 1fr);
    gap: 4px;
    padding: 10px 15px;
}

.key {
    height: 10px;
    background: #333;
    border-radius: 2px;
}

.touchpad {
    width: 120px;
    height: 8px;
    background: #555;
    margin: 5px auto;
    border-radius: 5px;
}

h2 {
    text-align: center;
}

input {
    width: 100%;
    padding: 10px;
    margin: 5px 0;
    border-radius: 5px;
    border: none;
}

button {
    width: 100%;
    padding: 10px;
    background: #00c6ff;
    border: none;
    color: white;
    font-weight: bold;
    cursor: pointer;
    border-radius: 5px;
    margin-top: 10px;
}

button:hover {
    background: #0072ff;
}

.result {
    margin-top: 20px;
    padding: 15px;
    border-radius: 10px;
    background: rgba(0,0,0,0.7);
    text-align: center;
}

.aman { color: #00ffcc; }
.cukup { color: yellow; }
.boros { color: red; }

.pengeluaran-item {
    display: flex;
    gap: 5px;
}

.pengeluaran-item input {
    flex: 1;
}

.hapus-btn {
    background: red;
    width: 28px;
    height: 28px;
    border-radius: 50%;
    color: white;
    border: none;
    cursor: pointer;
}
</style>
</head>

<body>

<div class="laptop">
<div class="frame">
<div class="camera"></div>

<div class="screen">
<div class="container">

<h2>Kalkulator Keuangan</h2>

<form id="form">
    <input type="number" id="gaji" placeholder="Masukkan Gaji" required>

    <h4>📋 Pengeluaran:</h4>

    <div id="pengeluaran-list">
        <div class="pengeluaran-item">
            <input type="text" placeholder="Contoh: Makan">
            <input type="number" placeholder="Jumlah">
            <button type="button" class="hapus-btn" onclick="this.parentElement.remove()">−</button>
        </div>
    </div>

    <button type="button" onclick="tambahInput()">+ Tambah Pengeluaran</button>
    <button type="submit">Hitung</button>
</form>

<div id="hasil" class="result" style="display:none;"></div>

</div>
</div>
</div>

<div class="base">
<div class="keyboard">
<div class="key"></div><div class="key"></div><div class="key"></div>
<div class="key"></div><div class="key"></div><div class="key"></div>
<div class="key"></div><div class="key"></div><div class="key"></div>
<div class="key"></div><div class="key"></div><div class="key"></div>
<div class="key"></div><div class="key"></div>
</div>
<div class="touchpad"></div>
</div>

</div>

<script>
function tambahInput() {
    let div = document.createElement("div");
    div.classList.add("pengeluaran-item");

    div.innerHTML = `
        <input type="text" placeholder="Nama">
        <input type="number" placeholder="Jumlah">
        <button type="button" class="hapus-btn" onclick="this.parentElement.remove()">−</button>
    `;

    document.getElementById("pengeluaran-list").appendChild(div);
}

document.getElementById("form").addEventListener("submit", function(e){
    e.preventDefault();

    let gaji = parseInt(document.getElementById("gaji").value) || 0;

    let items = document.querySelectorAll(".pengeluaran-item");

    let total = 0;

    items.forEach(item => {
        let jumlah = parseInt(item.children[1].value) || 0;
        total += jumlah;
    });

    let sisa = gaji - total;

    let persen = (total / gaji) * 100;

    let status = "";

    if (persen <= 50) {
        status = "AMAN";
    } else if (persen <= 80) {
        status = "CUKUP";
    } else {
        status = "BOROS";
    }

    let hasil = document.getElementById("hasil");
    hasil.style.display = "block";

    hasil.innerHTML = `
        Gaji: Rp ${gaji} <br>
        Total Pengeluaran: Rp ${total} <br>
        Sisa: Rp ${sisa} <br><br>

        ${
            status === "AMAN"
            ? `<strong class="aman">Investasi bro 👍</strong>`
            : status === "CUKUP"
            ? `<strong class="cukup">Naikkan income ⚠️</strong>`
            : `<strong class="boros">BOROS 😭</strong>`
        }
    `;
});
</script>

</body>
</html>
